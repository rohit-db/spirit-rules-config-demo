resources:
  apps:
    spirit_rules_config:
      name: ${var.app_name}
      description: "Rules Configuration - Proration Rate Management"
      source_code_path: .
      # Note: No Lakebase resource binding here. The app connects via
      # Databricks Secrets (set up by the setup_lakebase job). This avoids
      # deploy failures when the provisioned endpoint is still starting up.
      permissions:
        - level: CAN_MANAGE
          user_name: ${workspace.current_user.userName}
