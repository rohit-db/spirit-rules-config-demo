command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

# Update these to match your databricks.yml variables
env:
  - name: LAKEBASE_INSTANCE_NAME
    value: "spirit-rules-db"        # must match lakebase_instance_name in databricks.yml
  - name: SECRET_SCOPE
    value: "spirit-rules-config"    # must match secret_scope in databricks.yml
