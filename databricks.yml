bundle:
  name: spirit-rules-config

# ============================================================
# CONFIGURE THESE for your environment
# ============================================================
variables:
  lakebase_instance_name:
    description: "Name of the Lakebase database instance"
    default: "spirit-rules-db"
  lakebase_database_name:
    description: "Name of the database within Lakebase"
    default: "spirit_rules"
  app_name:
    description: "Databricks App name (appears in URL)"
    default: "spirit-rules-config"
  secret_scope:
    description: "Databricks secret scope for storing DB credentials"
    default: "spirit-rules-config"
  db_role:
    description: "Postgres role name the app uses to connect"
    default: "spirit_rules_app"
  autoscaling_min_cu:
    description: "Minimum compute units for Lakebase autoscaling"
    default: 0.5
  autoscaling_max_cu:
    description: "Maximum compute units for Lakebase autoscaling (max - min <= 16)"
    default: 2

include:
  - resources/*.yml

sync:
  include:
    - frontend/dist/**
  exclude:
    - node_modules/
    - .venv/
    - __pycache__/
    - frontend/src/
    - frontend/node_modules/
    - .git/
    - docs/

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://your-workspace.cloud.databricks.com

  # Example: override variables per target
  # prod:
  #   workspace:
  #     host: https://your-prod-workspace.cloud.databricks.com
  #   variables:
  #     autoscaling_min_cu: 1
  #     autoscaling_max_cu: 4
